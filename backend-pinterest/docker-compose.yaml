x-app-image: &app-image
  image: pinterest-backend:local
  build:
    context: .

services:
  db:
    image: postgres:16-alpine
    container_name: pinterest_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: pinterest_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: pinterest_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY};
        mc mb --ignore-existing local/${S3_BUCKET_NAME};
        mc anonymous set download local/${S3_BUCKET_NAME};
      "

  redis:
    image: redis:7-alpine
    container_name: pinterest_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: pinterest_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: pinterest
      RABBITMQ_DEFAULT_PASS: pinterest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  celery:
    <<: *app-image
    container_name: pinterest_celery
    profiles:
      - worker
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
    volumes:
      - ./src:/app/src
      - cache:/app/cache
    command: celery -A core.infra.celery worker --loglevel=info

  celery-beat:
    <<: *app-image
    container_name: pinterest_celery_beat
    profiles:
      - worker
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src 
    volumes:
      - ./src:/app/src
      - cache:/app/cache
    command: celery -A core.infra.celery beat --loglevel=info

  prometheus:
    image: prom/prometheus:latest
    container_name: pinterest_prometheus
    profiles:
      - monitoring
    depends_on:
      - api
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./src/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: pinterest_grafana
    profiles:
      - monitoring
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./src/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./src/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./src/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

  api:
    <<: *app-image
    container_name: pinterest_api
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
    volumes:
      - ./src:/app/src
      - cache:/app/cache
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  nginx:
    image: nginx:alpine
    container_name: pinterest_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
  redis_data:
  cache:
  prometheus_data:
  grafana_data:
