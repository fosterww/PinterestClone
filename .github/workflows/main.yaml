name: Backend CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/main.yaml"
      - "backend-pinterest/**"
  pull_request:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/main.yaml"
      - "backend-pinterest/**"
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./backend-pinterest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.13"
          enable-cache: true
          cache-dependency-glob: "backend-pinterest/uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Check formatting with Ruff
        run: uv run ruff format --check .

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Run tests
        env:
          JWT_SECRET_KEY: test_secret_key
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 1440
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_NAME: test_db
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 0
          S3_ENDPOINT_URL: http://localhost:9000
          S3_ACCESS_KEY_ID: test
          S3_SECRET_ACCESS_KEY: test
          S3_BUCKET_NAME: test
          CLARIFAI_API_KEY: test
          CLARIFAI_APP_ID: test
          CLARIFAI_USER_ID: test
          GEMINI_API_KEY: test
          OPENAI_API_KEY: test
        run: uv run pytest

  docker-build:
    name: Build Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend-pinterest
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend-pinterest
          file: ./backend-pinterest/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
