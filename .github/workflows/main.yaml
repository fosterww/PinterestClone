name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend-pinterest/**'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'backend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend-pinterest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "backend-pinterest/uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Check formatting with Ruff
        run: uv run ruff format --check .

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Run tests
        env:
          JWT_SECRET_KEY: test_secret_key
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 1440
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_NAME: test_db
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 0
          S3_ENDPOINT_URL: http://localhost:9000
          S3_ACCESS_KEY_ID: test
          S3_SECRET_ACCESS_KEY: test
          S3_BUCKET_NAME: test
          CLARIFAI_API_KEY: test
          CLARIFAI_APP_ID: test
          CLARIFAI_USER_ID: test
        run: uv run pytest

  build:
    name: Build Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        run: docker build -t task_tracker_app ./backend-pinterest